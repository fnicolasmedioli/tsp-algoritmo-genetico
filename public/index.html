<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link type="text/css" rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>
<body>

    <h1>TSP con algoritmo genético</h1>

    <div class="config-form">
        <label for="tamano_poblacion">Tamaño de la población (fija)</label>
        <input type="number" id="tamano_poblacion" value="100" />

        <label for="hijos_generados_por_iteracion">Hijos generados por iteración</label>
        <input type="number" id="hijos_generados_por_iteracion" value="30">

        <label for="tamano_recambio_generacional">Tamaño del recambio generacional</label>
        <input type="number" id="tamano_recambio_generacional" value="10">

        <label for="probabilidad_mutacion">Probabilidad de mutación</label>
        <input type="number" id="probabilidad_mutacion" value="0.05">

        <button id="boton-actualizar-config">Actualizar configuración</button>
    </div>

    <label>
        <span>Archivo de datos</span>
        <select id="select_nombre_archivo">
            <option value="br17.atsp">br17.atsp</option>
            <option value="p43.atsp">p43.atsp</option>
        </select>
    </label>

    <button id="boton-iniciar-parar">Iniciar</button>

    <div id="contenedor-grafico"></div>

</body>
</html>
